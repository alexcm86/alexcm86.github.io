<style>
  :root{
    --blue:#4f46e5;--blue-bg:#eef2ff;
    --purple:#6366f1;--purple-bg:#f0f0ff;
    --green:#059669;--green-bg:#ecfdf5;
    --amber:#f5a623;--amber-bg:#fff8e7;
    --red:#dc2626;--red-bg:#fef2f2;
    --indigo:#4248cc;
    --bg:#ecedf8;--card:#ffffff;--border:#dddff5;
    --text:#1a1d3e;--sub:#6b7080;--mute:#c4c5de;
    --shadow:0 4px 20px rgba(66,72,204,0.13);
    --header-bg:linear-gradient(135deg,#4248cc 0%,#6366f1 60%,#818cf8 100%);
    --header-shadow:rgba(66,72,204,0.35);
    --tab-active-color:#4248cc;
    --logo-span:#c7d2fe;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
    --gold:#f5a623;--gold-light:#fff3d6;
  }
  /* 피치 테마 */
  body.theme-peach{
    --bg:#fff0f0;--card:#fff8f6;--border:#ffd6cc;
    --text:#3d1a18;--sub:#a0706b;--mute:#f0c4bb;
    --shadow:0 4px 20px rgba(220,80,80,0.08);
    --header-bg:linear-gradient(135deg,#e8735a 0%,#f4a08a 100%);
    --header-shadow:rgba(232,115,90,0.25);
    --tab-active-color:#e8735a;
    --logo-span:#ffe0d6;
  }
  body.theme-dark{
    --bg:#0d1117;--card:#161b22;--border:#30363d;
    --text:#e6edf3;--sub:#8b949e;--mute:#3d444d;
    --shadow:0 4px 24px rgba(0,0,0,0.5);
    --header-bg:linear-gradient(135deg,#1a2332 0%,#0d1117 100%);
    --header-shadow:rgba(0,0,0,0.6);
    --tab-active-color:#58a6ff;
    --logo-span:#58a6ff;
  }
  body.theme-forest{
    --bg:#f0f7f0;--card:#ffffff;--border:#c8e6c8;
    --text:#1b3a1b;--sub:#4a7a4a;--mute:#b0d0b0;
    --shadow:0 4px 20px rgba(34,85,34,0.12);
    --header-bg:linear-gradient(135deg,#2d6a2d 0%,#3d8b3d 60%,#52a852 100%);
    --header-shadow:rgba(34,85,34,0.35);
    --tab-active-color:#2d6a2d;
    --logo-span:#a8d5a8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;font-synthesis:none}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);background-image:radial-gradient(circle at 20% 50%,rgba(99,102,241,0.04) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(245,166,35,0.04) 0%,transparent 40%);color:var(--text);display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

  /* Header */
  #header{background:var(--header-bg);border-bottom:none;padding:0 8px;display:flex;align-items:center;height:calc(56px + var(--safe-top));padding-top:var(--safe-top);gap:5px;flex-shrink:0;z-index:10;box-shadow:0 2px 16px var(--header-shadow);}
  .logo{font-weight:800;font-size:15px;letter-spacing:-0.3px;flex-shrink:0;color:#ffffff;white-space:nowrap;text-shadow:0 2px 12px rgba(0,0,0,0.18);}
  .logo span{color:var(--logo-span)}
  #tabs{display:flex;flex:1;justify-content:center;background:rgba(255,255,255,0.15);border-radius:14px;padding:3px;gap:1px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;}#tabs::-webkit-scrollbar{display:none;}
  .tab-btn{padding:4px 8px;border-radius:7px;border:none;font-size:10px;font-weight:600;font-family:inherit;background:transparent;color:rgba(255,255,255,0.55);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
  .tab-btn.active{background:#ffffff;color:var(--tab-active-color);box-shadow:0 1px 6px rgba(0,0,0,0.15);font-weight:700}


  /* Todo */
  #todo-main{flex:1;overflow-y:auto;padding:12px 16px;padding-bottom:calc(100px + var(--safe-bottom));}
  .todo-date{font-size:13px;font-weight:700;color:#4248cc;margin-bottom:12px;}
  .todo-add-bar{display:flex;gap:8px;margin-bottom:16px;}
  .todo-input{flex:1;padding:10px 14px;border-radius:12px;border:1.5px solid #e2e8f0;font-size:14px;font-family:inherit;outline:none;background:#fff;}
  .todo-input:focus{border-color:#7c3aed;}
  .todo-add-btn{padding:10px 16px;border-radius:12px;border:none;background:linear-gradient(135deg,#4248cc,#6366f1);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
  .todo-section-label{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:0.5px;margin:8px 0 6px;text-transform:uppercase;}
  .todo-item{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,0.06);cursor:pointer;transition:all .15s;}
  .todo-item.done{opacity:0.5;}
  .todo-check{width:22px;height:22px;border-radius:50%;border:2px solid #7c3aed;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
  .todo-item.done .todo-check{background:#7c3aed;border-color:#7c3aed;}
  .todo-check-icon{color:#fff;font-size:12px;display:none;}
  .todo-item.done .todo-check-icon{display:block;}
  .todo-text{flex:1;font-size:14px;font-weight:500;color:#1e293b;}
  .todo-item.done .todo-text{text-decoration:line-through;color:#94a3b8;}
  .todo-kpi-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#f1f5f9;color:#64748b;}
  .todo-del{font-size:16px;color:#cbd5e1;padding:2px 4px;cursor:pointer;flex-shrink:0;}
  .todo-del:hover{color:#ef4444;}
  .todo-kpi-select{width:100%;margin-top:8px;padding:8px 12px;border-radius:14px;border:1.5px solid #e2e8f0;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#64748b;}
  .todo-empty{text-align:center;padding:48px 0;color:#94a3b8;font-size:14px;}

  /* Main */
  #main{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:10px 14px 0;}

  /* FAB */
  #fab{position:fixed;bottom:calc(76px + var(--safe-bottom));right:18px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;font-size:22px;box-shadow:0 4px 20px rgba(66,72,204,0.5),0 0 0 3px rgba(199,210,254,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .3s;z-index:20;opacity:1;}
  #fab.hidden{opacity:0;pointer-events:none}
  #fab:active{transform:scale(0.9)}

  /* Filter */
  #filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;margin-bottom:6px;}
  #filter-bar::-webkit-scrollbar{display:none}
  .filter-chip{padding:5px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:#555;font-weight:600;font-size:11px;font-family:inherit;white-space:nowrap;cursor:pointer;flex-shrink:0}
  .filter-chip.active{background:#eef2ff;border-color:#4248cc;box-shadow:0 0 0 3px rgba(66,72,204,0.15);color:#4f46e5}

  /* Controls */
  #ctrl-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-shrink:0;}
  .size-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid #c7d2fe;background:#eef2ff;color:#4f46e5;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .size-btn:active{background:#f0f0f0}
  #size-label{font-size:11px;color:var(--sub);font-weight:600;min-width:30px;text-align:center}
  .sort-btn{margin-left:auto;padding:4px 11px;border-radius:99px;border:1.5px solid #c7d2fe;background:#eef2ff;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;color:#4f46e5;}

  /* Card list */
  #card-list{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(130px + var(--safe-bottom));}
  #card-list::-webkit-scrollbar{display:none}

  /* KPI Card */
  .kpi-card{background:var(--card);border-radius:14px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(66,72,204,0.13),0 1px 4px rgba(66,72,204,0.08);position:relative;margin-bottom:8px;overflow:hidden;}
  .kpi-card.done{border-color:#4248cc;box-shadow:0 0 0 3px rgba(66,72,204,0.15);box-shadow:0 2px 12px rgba(79,70,229,0.15);}
  .card-inner{display:flex;align-items:center;padding:0 10px;height:var(--card-h,72px);gap:9px;}

  /* Ring - CSS로 크기 제어, viewBox 고정 */
  .ring-wrap{position:relative;flex-shrink:0;width:var(--ring,40px);height:var(--ring,40px);}
  .ring-svg{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;line-height:1;}

  .kpi-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:1px;padding-right:2px}
  .kpi-chips{display:flex;align-items:center;gap:4px}
  .cat-chip{font-weight:600;border-radius:4px;padding:1px 5px}
  .kpi-title{font-weight:700;line-height:1.3;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kpi-nums{color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kpi-bar-wrap{height:3px;background:#f0f0f0;border-radius:99px;overflow:hidden;margin-top:2px}
  .kpi-bar-fill{height:100%;border-radius:99px}
  .done-badge{position:absolute;top:6px;right:8px;background:linear-gradient(135deg,#f5a623,#fbbf24);color:#fff;font-weight:700;border-radius:5px;padding:1px 5px;line-height:1.4;}
  .drag-handle{flex-shrink:0;display:flex;flex-direction:column;justify-content:center;gap:3px;padding:4px;cursor:grab;opacity:0.3}
  .drag-handle div{width:14px;height:2px;background:#666;border-radius:2px}

  /* Actions */
  .kpi-actions{display:flex;border-top:1px solid #f5f5f5;}
  .act-btn{flex:1;border:none;background:transparent;font-family:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
  .act-btn+.act-btn{border-left:1px solid #f5f5f5}
  .act-log{color:#fff;flex:2}.act-hist{color:#555}.act-edit{color:#555}.act-del{color:var(--red)}

  /* Dashboard */
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
  .stat-card{background:var(--card);border-radius:14px;padding:14px 8px;text-align:center;box-shadow:0 4px 20px rgba(66,72,204,0.13),0 1px 4px rgba(66,72,204,0.08)}
  .stat-val{font-size:24px;font-weight:800;letter-spacing:-1px;display:flex;align-items:baseline;justify-content:center;gap:1px}
  .stat-val sub{font-size:12px;font-weight:500;color:var(--sub);vertical-align:baseline}
  .stat-label{font-size:12px;color:var(--sub);margin-top:2px}
  .section-card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(66,72,204,0.13),0 1px 4px rgba(66,72,204,0.08);margin-bottom:12px;border:1px solid var(--border)}
  .section-title{font-size:13px;font-weight:700;color:#4248cc;letter-spacing:0.3px;margin-bottom:12px}
  .cat-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .cat-label{font-size:13px;font-weight:700;width:60px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{flex:1;height:8px;background:#f0f0f0;border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width 0.5s ease;filter:brightness(1.05);}
  .bar-pct{font-size:13px;font-weight:700;color:#4248cc;font-weight:700;width:36px;text-align:right}
  #dash-main{flex:1;overflow-y:auto;padding-bottom:calc(130px + var(--safe-bottom))}

  /* Top KPI list in dash */
  .top-kpi-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f5f5f5}
  .top-kpi-row:last-child{border-bottom:none}
  .top-rank{font-size:16px;font-weight:800;color:var(--mute);width:22px;text-align:center}
  .top-title{flex:1;font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top-pct{font-size:15px;font-weight:800}

  .empty{text-align:center;padding:60px 0;color:var(--mute)}
  .empty-icon{font-size:36px;margin-bottom:10px}
  .empty-text{font-size:13px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:100;display:flex;align-items:center;justify-content:center;padding:0 14px;animation:fadeIn .18s ease}
  .overlay.bottom{align-items:flex-end;padding:0}
  .modal-box{background:var(--card);border-radius:20px;width:100%;max-width:440px;padding:24px 20px 20px;box-shadow:0 24px 60px rgba(30,41,96,0.2);animation:slideUp .2s ease;max-height:88vh;overflow-y:auto}
  .modal-box.sheet{border-radius:18px 18px 0 0;max-width:100%;padding-bottom:calc(20px + var(--safe-bottom));animation:slideUpB .2s ease;max-height:75vh}
  .modal-title{font-weight:800;font-size:16px;margin-bottom:18px}
  label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:4px;margin-top:12px}
  label:first-of-type{margin-top:0}
  input,select,textarea{width:100%;padding:10px 12px;border-radius:14px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;color:var(--text);background:#fafafa;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--blue);background:#fff}
  textarea{resize:none;height:66px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
  .btn-cancel{padding:9px 16px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);color:#555;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
  .btn-save{padding:9px 20px;border-radius:14px;border:none;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
  .btn-save:disabled{opacity:0.35;cursor:default}
  .btn-full{width:100%;padding:11px;border-radius:14px;border:none;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:14px}
  .hist-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f3f3f3}
  .hist-date{font-size:11px;color:var(--mute);min-width:78px}
  .hist-val{font-weight:700;font-size:12px;border-radius:6px;padding:2px 8px}
  .hist-note{font-size:12px;color:#666;flex:1}


  /* ── 달성이력 ── */
  #history-main{flex:1;overflow-y:auto;padding-bottom:calc(130px + var(--safe-bottom));}
  .year-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 0 8px;cursor:pointer;user-select:none;
  }
  .year-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
  .year-summary{font-size:11px;color:var(--sub);font-weight:600}
  .year-arrow{font-size:12px;color:var(--mute);transition:transform .2s}
  .year-arrow.open{transform:rotate(90deg)}
  .year-stats{
    display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
    margin-bottom:8px;
  }
  .ys-card{background:var(--card);border-radius:12px;padding:10px 6px;text-align:center;box-shadow:0 4px 20px rgba(66,72,204,0.13),0 1px 4px rgba(66,72,204,0.08);border:1px solid var(--border)}
  .ys-val{font-size:22px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:baseline;justify-content:center;gap:1px}
  .ys-val sub{font-size:12px;font-weight:500;color:var(--sub);vertical-align:baseline}
  .ys-label{font-size:12px;color:var(--sub);margin-top:2px}
  .hist-goal-card{
    background:var(--card);border-radius:14px;border:1px solid var(--border);
    margin-bottom:8px;overflow:hidden;box-shadow:0 4px 20px rgba(66,72,204,0.13),0 1px 4px rgba(66,72,204,0.08);
  }
  .hist-goal-header{
    display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
  }
  .hist-goal-info{flex:1;min-width:0}
  .hist-goal-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hist-goal-sub{font-size:12px;color:var(--sub)}
  .hist-goal-pct{font-size:16px;font-weight:800;flex-shrink:0}
  .hist-goal-arrow{font-size:11px;color:var(--mute);transition:transform .2s;flex-shrink:0}
  .hist-goal-arrow.open{transform:rotate(90deg)}
  .hist-goal-body{display:none;border-top:1px solid #f5f5f5;padding:10px 14px}
  .hist-goal-body.open{display:block}
  .hist-log-row{
    display:flex;align-items:center;gap:8px;
    padding:6px 0;border-bottom:1px solid #f9f9f9;font-size:12px;
  }
  .hist-log-row:last-child{border-bottom:none}
  .hist-log-date{color:var(--mute);min-width:84px;font-size:12px}
  .hist-log-val{font-weight:700;border-radius:5px;padding:2px 9px;font-size:12px}
  .hist-log-note{color:#666;flex:1;font-size:12px}
  .hist-mini-bar{height:4px;background:#f0f0f0;border-radius:99px;overflow:hidden;margin:8px 0 4px}
  .hist-mini-fill{height:100%;border-radius:99px}
  .year-block{margin-bottom:4px}
  .year-content{display:none}
  .year-content.open{display:block}
  .no-history{text-align:center;padding:50px 0;color:var(--mute)}

  /* 연도 탭 선택 */
  #year-tab-bar{
    display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;
  }
  #year-tab-bar::-webkit-scrollbar{display:none}
  .year-chip{
    padding:5px 14px;border-radius:99px;border:1.5px solid var(--border);
    background:var(--card);color:#555;font-weight:700;font-size:12px;
    font-family:inherit;white-space:nowrap;cursor:pointer;flex-shrink:0;
  }
  .year-chip.active{background:#eef2ff;border-color:#4248cc;box-shadow:0 0 0 3px rgba(66,72,204,0.15);color:#4f46e5}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUpB{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
</style>

<body>

<div id="header">
  <div class="logo">해<span>냄</span></div>
  <div id="tabs">
    <button class="tab-btn active" id="tab-list" onclick="switchView('list')">목록</button>
    <button class="tab-btn" id="tab-dash" onclick="switchView('dash')">대시보드</button>
    <button class="tab-btn" id="tab-hist" onclick="switchView('history')">이력</button>
    <button class="tab-btn" id="tab-todo" onclick="switchView('todo')">할일</button>
  </div>
  <button onclick="toggleLang()" id="lang-btn" style="
    padding:3px 8px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.4);
    background:transparent;color:#fff;font-size:11px;font-weight:700;
    font-family:inherit;cursor:pointer;flex-shrink:0;letter-spacing:0.3px;
    transition:all .15s;
  ">KO</button>
  <button onclick="exportData()" id="btn-export" title="백업" style="

function getHaenaemStage(avg) {
  if (avg >= 100) return 4; // stage5 (완전히 꽃핌)
  if (avg >= 80)  return 3; // stage4
  if (avg >= 60)  return 2; // stage3
  if (avg >= 40)  return 1; // stage2
  if (avg >= 20)  return 0; // stage1 -> 사실상 0부터
  return 0; // stage1 (새싹)
}
function getHaenaemMsg(avg) {
  if (avg >= 100) return lang==='ko'?'🎉 성장 완료!':'🎉 Complete!';
  if (avg >= 80)  return lang==='ko'?'💪 거의 다 왔어요!':'💪 Almost there!';
  if (avg >= 60)  return lang==='ko'?'🌿 잘 자라고 있어요':'🌿 Growing well!';
  if (avg >= 40)  return lang==='ko'?'🌱 꾸준히 성장 중':'🌱 Steady growth';
  if (avg >= 20)  return lang==='ko'?'☀️ 새싹이 올라와요':'☀️ Sprouting!';
  return lang==='ko'?'🌱 시작해볼까요?':'🌱 Let\'s start!';
}

function load(){

    goals=d.goals||[]; todos=d.todos||[]; cardScale=d.scale||100; lang=d.lang||'ko'; theme=d.theme||'default'; applyTheme(theme);

function exportData(){
  const data=JSON.stringify({goals,scale:cardScale,lang},null,2);

  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;
  a.download=`kpi-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);

function importData(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d.goals)) throw new Error('invalid');
      goals=d.goals;
      if(d.scale) cardScale=d.scale;
      if(d.lang) lang=d.lang;
      save();render();
      alert(lang==='ko'?`✅ ${goals.length}개 KPI 복원 완료!`:`✅ ${goals.length} KPIs restored!`);
    }catch{
      alert(lang==='ko'?'❌ 올바른 백업 파일이 아니에요':'❌ Invalid backup file');
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

function formatDateLabel(dateStr){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const dayNames=lang==='ko'?['일','월','화','수','목','금','토']:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return lang==='ko'
    ?`${y}년 ${m}월 ${d}일 (${dayNames[dt.getDay()]})`
    :`${dayNames[dt.getDay()]}, ${dt.toLocaleDateString('en-US',{month:'long',day:'numeric'})}`;
}

function renderTodoItems(items, isHistory){
  let h='';
  items.forEach(td=>{
    const kpiName=td.kpiId?goals.find(g=>g.id===td.kpiId)?.name:'';
    const isDone=td.done;
    h+=`<div class="todo-item${isDone?' done':''}" onclick="${isHistory?'':` toggleTodo('${td.id}')`}">
      <div class="todo-check"><span class="todo-check-icon">✓</span></div>
      <div class="todo-text">${esc(td.text)}</div>
      ${kpiName?`<span class="todo-kpi-tag">🎯 ${esc(kpiName)}</span>`:''}
      ${!isHistory?`<span class="todo-del" onclick="event.stopPropagation();deleteTodo('${td.id}')">×</span>`:''}
    </div>`;
  });
  return h;
}

function renderTodo(){
  const todayStr=today();
  const kpiOptions=goals.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('');

  // 날짜별 그룹핑 (최신순)
  const dateMap={};
  todos.forEach(td=>{
    if(!dateMap[td.date]) dateMap[td.date]=[];
    dateMap[td.date].push(td);
  });
  const sortedDates=Object.keys(dateMap).sort((a,b)=>b.localeCompare(a));

  let h=`<div id="todo-main">`;

  // 오늘 섹션 (상단 고정)
  h+=`<div class="todo-date">${formatDateLabel(todayStr)}</div>`;
  h+=`<div class="todo-add-bar">
    <input class="todo-input" id="todo-input" type="text" placeholder="${lang==='ko'?'오늘 할일 입력...':'Add a task for today...'}" onkeydown="if(event.key==='Enter')addTodo()">
    <button class="todo-add-btn" onclick="addTodo()">${lang==='ko'?'추가':'Add'}</button>
  </div>`;


  const todayItems=dateMap[todayStr]||[];
  const pending=todayItems.filter(td=>!td.done);
  const done=todayItems.filter(td=>td.done);

  if(todayItems.length===0){
    h+=`<div class="todo-empty">✏️<br>${lang==='ko'?'오늘 할일을 추가해보세요':'Add tasks for today'}</div>`;
  } else {
    if(pending.length>0){
      h+=`<div class="todo-section-label">${lang==='ko'?`미완료 ${pending.length}개`:`${pending.length} pending`}</div>`;
      h+=renderTodoItems(pending, false);
    }
    if(done.length>0){
      h+=`<div class="todo-section-label">${lang==='ko'?`완료 ${done.length}개`:`${done.length} done`}</div>`;
      h+=renderTodoItems(done, false);
    }
  }

  // 이전 날짜 히스토리 (아래로, 접기/펼치기)
  const pastDates=sortedDates.filter(d=>d!==todayStr);
  if(pastDates.length>0){
    h+=`<div style="margin-top:24px;border-top:1.5px solid #e2e8f0;padding-top:16px;">`;
    h+=`<div style="font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:12px;">${lang==='ko'?'📅 이전 기록':'📅 Past Records'}</div>`;
    pastDates.forEach(dateStr=>{
      const items=dateMap[dateStr];
      const pDone=items.filter(td=>td.done).length;
      const hasUndone=items.some(td=>!td.done);
      const collapseId=`todo-hist-${dateStr}`;
      h+=`<div style="margin-bottom:10px;background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,0.06);overflow:hidden;">`;
      // 헤더 (탭하면 접기/펼치기)
      h+=`<div onclick="toggleTodoHist('${collapseId}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;font-weight:700;color:#334155;">${formatDateLabel(dateStr)}</span>
          ${hasUndone?`<span style="font-size:10px;font-weight:700;color:#f59e0b;background:#fef3c7;padding:1px 6px;border-radius:20px;">${lang==='ko'?'미완료':'undone'}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:#94a3b8;">${pDone}/${items.length} ${lang==='ko'?'완료':'done'}</span>
          <span id="${collapseId}-arrow" style="font-size:12px;color:#94a3b8;transition:transform .2s;">▼</span>
        </div>
      </div>`;
      // 내용 (기본 접힘)
      h+=`<div id="${collapseId}" style="display:none;padding:0 14px 12px;">`;
      h+=renderTodoItems(items, true);
      h+=`</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  h+=`</div>`;
  return h;
}

/* ── Scale ── */
function applyScale(){
  const t=(cardScale-SCALE_MIN)/(SCALE_MAX-SCALE_MIN);
  const h=Math.round(38+(72-38)*t);
  const actH=Math.round(22+(32-22)*t);
  const fs=Math.max(9,Math.round(13*cardScale/100));
  const fsS=Math.max(8,Math.round(11*cardScale/100));
  const fsXS=Math.max(7,Math.round(10*cardScale/100));
  const ring=Math.max(28,Math.round(44*cardScale/100));
  const r=document.documentElement;
  r.style.setProperty('--card-h',h+'px');
  r.style.setProperty('--act-h',actH+'px');
  r.style.setProperty('--fs',fs+'px');
  r.style.setProperty('--fsS',fsS+'px');
  r.style.setProperty('--fsXS',fsXS+'px');
  r.style.setProperty('--ring',ring+'px');
  const lbl=document.getElementById('size-label');
  if(lbl) lbl.textContent=cardScale+'%';
}
function scaleUp(){if(cardScale<SCALE_MAX){cardScale=Math.min(SCALE_MAX,cardScale+SCALE_STEP);save();applyScale();}}
function scaleDown(){if(cardScale>SCALE_MIN){cardScale=Math.max(SCALE_MIN,cardScale-SCALE_STEP);save();applyScale();}}

  // ③ D-day 임박
  if(urgent.length){

    urgent.slice(0,4).forEach(g=>{

function drawCharts(){

function drawDonut(){
  const canvas=document.getElementById('donut-chart');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const byCat=CATS.map(c=>({cat:c,items:goals.filter(g=>g.category===c)})).filter(x=>x.items.length>0);
  if(!byCat.length) return;
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2, outerR=38, innerR=24;
  ctx.clearRect(0,0,W,H);
  let startAngle=-Math.PI/2;
  const total=byCat.reduce((s,{items})=>s+items.length,0);
  byCat.forEach(({cat,items})=>{
    const slice=(items.length/total)*2*Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,outerR,startAngle,startAngle+slice);
    ctx.closePath();
    ctx.fillStyle=getCAT_COLOR()[cat];
    ctx.fill();
    startAngle+=slice;
  });
  // inner hole
  ctx.beginPath();
  ctx.arc(cx,cy,innerR,0,2*Math.PI);
  ctx.fillStyle='#fff';
  ctx.fill();
}

let histYear = null; // 선택된 연도

function renderHistory(){
  // 모든 연도 추출 (createdAt + logs.date 기준)
  const yearSet = new Set();
  goals.forEach(g=>{
    if(g.createdAt) yearSet.add(g.createdAt.slice(0,4));
    (g.logs||[]).forEach(l=>{ if(l.date) yearSet.add(l.date.slice(0,4)); });
  });
  const years=[...yearSet].sort((a,b)=>b-a);
  const curYear=new Date().getFullYear().toString();
  if(!histYear || !yearSet.has(histYear)) histYear = years[0]||curYear;
  if(!years.length) years.push(curYear);

  if(!goals.length){
    return `<div id="history-main"><div class="no-history"><div style="font-size:36px;margin-bottom:10px">📂</div><div style="font-size:13px">${t("noHistory")}</div></div></div>`;
  }

  // 연도 탭
  let h=`<div id="year-tab-bar">`;
  years.forEach(y=>{
    h+=`<button class="year-chip${y===histYear?' active':''}" onclick="selectHistYear('${y}')">${y}년</button>`;
  });
  h+=`</div>`;

  h+=`<div id="history-main">`;

  // 선택 연도의 목표들 필터 (해당 연도에 생성되었거나 로그가 있는 것)
  const yrGoals = goals.filter(g=>{
    const created = (g.createdAt||'').slice(0,4)===histYear;
    const hasLog = (g.logs||[]).some(l=>(l.date||'').slice(0,4)===histYear);
    return created || hasLog;
  });

  // 연도 요약 통계
  const total=yrGoals.length;
  const done=yrGoals.filter(g=>g.current>=g.target).length;
  const yrLogs=yrGoals.flatMap(g=>(g.logs||[]).filter(l=>(l.date||'').slice(0,4)===histYear));
  const totalLogs=yrLogs.length;

  h+=`<div class="year-stats">
    <div class="ys-card"><div class="ys-val">${total}${lang==='ko'?'<sub>개</sub>':''}</div><div class="ys-label">${t("regKpi")}</div></div>
    <div class="ys-card"><div class="ys-val" style="color:var(--green)">${done}${lang==='ko'?'<sub>개</sub>':''}</div><div class="ys-label">${lang==='ko'?'달성 완료':'Completed'}</div></div>
    <div class="ys-card"><div class="ys-val" style="color:var(--blue)">${totalLogs}${lang==='ko'?'<sub>건</sub>':''}</div><div class="ys-label">${t("totalLog")}</div></div>
  </div>`;

  if(!yrGoals.length){
    h+=`<div class="no-history" style="padding:30px 0"><div style="font-size:13px;color:var(--mute)">${histYear}년 데이터가 없어요</div></div>`;
    return h+`</div>`;
  }

  // 달성률 현황 - 전체현황과 동일한 스타일
  const yrSorted=[...yrGoals].sort((a,b)=>pctVal(b)-pctVal(a));
  h+=`<div class="section-card" id="hist-capture-area" style="margin-bottom:10px">
    <div class="section-title">${histYear}${t('histChart')}</div>
    ${yrSorted.map((g,i)=>{
      const p=pctVal(g), color=getCAT_COLOR()[g.category];
      const medals=['🥇','🥈','🥉'];
      const rank=i<3?medals[i]:`<span style="font-size:12px;font-weight:800;color:var(--mute)">${i+1}</span>`;
      return `<div class="cat-row">
        <div style="width:22px;text-align:center;flex-shrink:0;font-size:15px">${rank}</div>
        <div style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <div style="flex:1;font-size:13px;font-weight:600;color:${color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g.title)}</div>
        <div class="bar-track" style="max-width:100px"><div class="bar-fill" style="width:${Math.min(100,p)}%;background:${color}"></div></div>
        <div class="bar-pct" style="color:${color};font-weight:800">${p}%</div>
      </div>`;
    }).join('')}
  </div>`;

  // 카테고리별 분류
  const byCat = CATS_KO.map(c=>({cat:c, items:yrGoals.filter(g=>g.category===c)})).filter(x=>x.items.length>0);
  byCat.forEach(({cat,items})=>{
    const catDone=items.filter(g=>g.current>=g.target).length;

        <div style="width:8px;height:8px;border-radius:50%;background:${getCAT_COLOR()[cat]};flex-shrink:0"></div>

      </div>`;
    items.sort((a,b)=>pctVal(b)-pctVal(a)).forEach(g=>{
      const p=pctVal(g), disp=Math.min(100,p);
      const color=getCAT_COLOR()[g.category], bg=getCAT_BG()[g.category];
      const yrGoalLogs=(g.logs||[]).filter(l=>(l.date||'').slice(0,4)===histYear);
      const gid='hg-'+g.id;
      h+=`<div class="hist-goal-card">

              <circle cx="22" cy="22" r="18" fill="none" stroke="${color}" stroke-width="4"
                stroke-dasharray="${(2*Math.PI*18).toFixed(1)}"
                stroke-dashoffset="${(2*Math.PI*18*(1-disp/100)).toFixed(1)}"
                stroke-linecap="round"/>
            </svg>
          </div>
          <div class="hist-goal-info">
            <div class="hist-goal-title">${esc(g.title)}</div>
            <div class="hist-goal-sub">${fmt(g.current)} / ${fmt(g.target)} ${esc(g.unit||'')} · ${yrGoalLogs.length}건 기록</div>
          </div>
          <div class="hist-goal-pct" style="color:${color}">${p}%</div>
          <div class="hist-goal-arrow" id="arr-${gid}">▶</div>
        </div>
        <div class="hist-goal-body" id="${gid}">
          <div class="hist-mini-bar">
            <div class="hist-mini-fill" style="width:${disp}%;background:${color}"></div>
          </div>
          <div style="font-size:10px;color:var(--sub);margin-bottom:8px">
            ${g.deadline?'마감: '+g.deadline+' · ':''} 
            생성: ${g.createdAt||'-'} · 
            ${g.current>=g.target?'✅ 달성완료':'진행중'}
          </div>
          ${yrGoalLogs.length===0
            ? `<div style="font-size:12px;color:var(--mute);padding:8px 0">이 연도에 기록이 없어요</div>`
            : [...yrGoalLogs].reverse().map(l=>`
              <div class="hist-log-row">
                <div class="hist-log-date">${l.date}</div>
                <div class="hist-log-val" style="background:${bg};color:${color}">+${fmt(l.value)} ${esc(g.unit||'')}</div>
                ${l.note?`<div class="hist-log-note">${esc(l.note)}</div>`:''}
              </div>`).join('')
          }
        </div>
      </div>`;
    });
    h+=`</div>`;
  });

  h+=`</div>`;
  // 차트 그리기는 DOM 삽입 후
  return h;
}

/* ── Card ── */
function renderCard(g){
  const p=pctVal(g), dispPct=Math.min(100,p);
  const color=getCAT_COLOR()[g.category], bg=getCAT_BG()[g.category];
  const done=p>=100;
  let dday='';
  const todayStr=today();
  // 시작일이 미래면 "N일 후 시작" 표시
  if(g.startAt && g.startAt > todayStr){
    const startDiff=Math.ceil((new Date(g.startAt)-new Date())/86400000);
    dday=`<span style="font-size:var(--fsXS,9px);color:#6366f1">D-${startDiff} 시작</span>`;
  } else if(g.deadline){
    const diff=Math.ceil((new Date(g.deadline)-new Date())/86400000);
    const col=diff<7?'#dc2626':'#aaa';
    dday=`<span style="font-size:var(--fsXS,9px);color:${col}">${diff>0?'D-'+diff:diff===0?'오늘':'D+'+Math.abs(diff)}</span>`;
  }
  // SVG ring: viewBox 고정(0 0 44 44), CSS로 크기 제어 → 깨짐 없음
  const dashTotal=2*Math.PI*18; // r=18
  const dashOffset=(dashTotal*(1-dispPct/100)).toFixed(1);
  const ring=`<svg class="ring-svg" viewBox="0 0 44 44">
    <circle cx="22" cy="22" r="18" fill="none" stroke="#f0f0f0" stroke-width="3.5"/>
    <circle cx="22" cy="22" r="18" fill="none" stroke="${color}" stroke-width="3.5"
      stroke-dasharray="${dashTotal.toFixed(1)}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"/>
  </svg>`;
  const handle=sortMode==='manual'?`<div class="drag-handle"><div></div><div></div><div></div></div>`:'';
  return `<div class="kpi-card${done?' done':''}" data-id="${g.id}" draggable="${sortMode==='manual'}">
    ${done?`<div class="done-badge" style="font-size:var(--fsXS,9px)">✓달성</div>`:''}
    <div class="card-inner">
      <div class="ring-wrap">
        ${ring}
        <div class="ring-label" style="font-size:var(--fsXS,9px);color:${color}">${p}%</div>
      </div>
      <div class="kpi-body">
        <div class="kpi-chips">
          <span class="cat-chip" style="background:${bg};color:${color};font-size:var(--fsXS,9px)">${g.category}</span>${dday}
        </div>
        <div class="kpi-title" style="font-size:var(--fs,13px)">${esc(g.title)}</div>
        <div class="kpi-nums" style="font-size:var(--fsS,11px)">${fmt(g.current)} / ${fmt(g.target)} ${esc(g.unit||"")}</div>
        <div class="kpi-bar-wrap"><div class="kpi-bar-fill" style="width:${dispPct}%;background:${color}"></div></div>
      </div>
      ${handle}
    </div>
    <div class="kpi-actions" style="height:var(--act-h,30px)">
      <button class="act-btn act-log" style="background:${color};font-size:var(--fsS,11px)" onclick="openLog('${g.id}')">+ 기록</button>
      <button class="act-btn act-hist" style="font-size:var(--fsS,11px)" onclick="openHist('${g.id}')">히스토리</button>
      <button class="act-btn act-edit" style="font-size:var(--fsS,11px)" onclick="openEdit('${g.id}')">수정</button>
      <button class="act-btn act-del" style="font-size:var(--fsS,11px)" onclick="delGoal('${g.id}')">삭제</button>
    </div>
  </div>`;
}

/* ── Drag ── */
function initDrag(){
  if(sortMode!=='manual') return;
  const list=document.getElementById('card-list');
  if(!list) return;
  let dragging=null, placeholder=null;
  function getCard(el){while(el&&!el.classList.contains('kpi-card'))el=el.parentElement;return el;}
  function cards(){return[...list.querySelectorAll('.kpi-card')];}
  list.addEventListener('touchstart',e=>{
    const h=e.target.closest('.drag-handle');
    if(!h) return;
    e.preventDefault();
    dragging=getCard(h); if(!dragging) return;
    dragging.style.opacity='0.5';
    placeholder=document.createElement('div');
    placeholder.style.cssText=`height:${dragging.offsetHeight}px;margin-bottom:6px;border-radius:12px;background:#e8f0fe;border:2px dashed var(--blue)`;
    list.insertBefore(placeholder,dragging.nextSibling);
  },{passive:false});
  list.addEventListener('touchmove',e=>{
    if(!dragging) return; e.preventDefault();
    const y=e.touches[0].clientY;
    dragging.style.cssText=`opacity:0.5;position:fixed;width:${list.offsetWidth}px;left:${list.getBoundingClientRect().left}px;top:${y-40}px;z-index:999`;
    const els=cards().filter(c=>c!==dragging);
    for(const c of els){
      const mid=c.getBoundingClientRect().top+c.offsetHeight/2;
      if(y<mid){list.insertBefore(placeholder,c);break;}
      else if(c===els[els.length-1]) list.appendChild(placeholder);
    }
  },{passive:false});
  list.addEventListener('touchend',e=>{
    if(!dragging) return;
    dragging.style.cssText=''; list.insertBefore(dragging,placeholder); placeholder.remove();
    const order=cards().map(c=>c.dataset.id);
    goals.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
    save(); dragging=null; placeholder=null;
  });
}

      현재 <b>${fmt(g.current)}</b> / 목표 <b>${fmt(g.target)} ${esc(g.unit)}</b>
    </div>
    <label>${t("logLbl")}</label>
    <input id="l-val" type="number" placeholder="${t('logPh')}" oninput="chkLog()">
    <label>${t("noteLbl")}</label>
    <input id="l-note" placeholder="${t('logNote')}">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">${t("cancel")}</button>
      <button id="btn-log" class="btn-save" disabled onclick="saveLog('${id}')">${t('logBtn')}</button>
    </div>`);
  setTimeout(()=>document.getElementById('l-val')?.focus(),100);
}
function chkLog(){const v=document.getElementById('l-val')?.value;const b=document.getElementById('btn-log');if(b)b.disabled=!v;}
function saveLog(id){
  const val=parseFloat(document.getElementById('l-val').value)||0;
  if(!val) return;
  const note=document.getElementById('l-note').value.trim();
  const i=goals.findIndex(x=>x.id===id);
  goals[i].logs.push({date:today(),value:val,note});
  goals[i].current=goals[i].logs.reduce(function(s,l){return s+l.value;},0);
  save();closeModal();render();
}
function editLog(gid,idx){
  const g=goals.find(x=>x.id===gid);
  const l=g.logs[idx];
  showModal(`<div class="modal-title">기록 수정</div>
    <div style="font-size:12px;color:#888;margin-bottom:14px">${esc(g.title)} · ${l.date}</div>
    <label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">값 (${esc(g.unit)})</label>
    <input id="elv" type="number" value="${l.value}" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;margin-bottom:10px;box-sizing:border-box">
    <label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">메모</label>
    <input id="eln" type="text" value="${esc(l.note||'')}" placeholder="메모 (선택)" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:16px;box-sizing:border-box">
    <button class="btn-full" id="elSave">저장</button>
    <button class="btn-full" style="background:#f5f5f5;color:var(--text);margin-top:8px" id="elCancel">취소</button>
  `);
  document.getElementById('elSave').onclick=function(){
    const v=parseFloat(document.getElementById('elv').value);
    const n=document.getElementById('eln').value.trim();
    if(isNaN(v)||v<0){alert('올바른 값을 입력하세요');return;}
    g.logs[idx]={date:g.logs[idx].date,value:v,note:n};
    g.current=g.logs.reduce(function(s,l){return s+l.value;},0);
    save();render();closeModal();
    setTimeout(function(){openHist(gid);},150);
  };
  document.getElementById('elCancel').onclick=function(){
    closeModal();setTimeout(function(){openHist(gid);},150);
  };
}
function delLog(gid,idx){
  if(!confirm('이 기록을 삭제할까요?'))return;
  const g=goals.find(x=>x.id===gid);
  g.logs.splice(idx,1);
  g.current=g.logs.reduce(function(s,l){return s+l.value;},0);
  save();render();closeModal();
  setTimeout(function(){openHist(gid);},150);
}
function openHist(id){
  const g=goals.find(x=>x.id===id);
  const color=getCAT_COLOR()[g.category],bg=getCAT_BG()[g.category];
  const logsCopy=[...g.logs].map(function(l,i){return {l:l,i:i};}).reverse();
  let rows='';
  if(logsCopy.length===0){
    rows='<div style="text-align:center;padding:28px 0;color:#ccc;font-size:13px">'+t('noLog')+'</div>';
  } else {
    logsCopy.forEach(function(item){
      const l=item.l, i=item.i;
      rows+='<div style="padding:8px 0;border-bottom:1px solid #f3f3f3">'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">'
        +'<span style="font-size:11px;color:#aaa;flex-shrink:0">'+l.date+'</span>'
        +'<span class="hist-val" style="background:'+bg+';color:'+color+'">+'+fmt(l.value)+' '+esc(g.unit)+'</span>'
        +(l.note?'<span style="font-size:11px;color:#999">'+esc(l.note)+'</span>':'')
        +'</div>'
        +'<div style="display:flex;gap:6px">'
        +'<button data-gid="'+g.id+'" data-idx="'+i+'" class="hedit-btn" style="flex:1;padding:5px 0;border:1px solid #ddd;border-radius:8px;background:#fafafa;color:#555;cursor:pointer;font-size:12px">✏️ 수정</button>'
        +'<button data-gid="'+g.id+'" data-idx="'+i+'" class="hdel-btn" style="flex:1;padding:5px 0;border:1px solid #fcc;border-radius:8px;background:#fff5f5;color:#e44;cursor:pointer;font-size:12px">🗑️ 삭제</button>'
        +'</div>'
        +'</div>';
    });
  }
  showModal('<div class="modal-title">'+t('histTitle')+'</div>'
    +'<div style="font-size:12px;color:#888;margin-bottom:12px">'+esc(g.title)+'</div>'
    +'<div style="overflow-y:auto;max-height:260px">'+rows+'</div>'
    +'<button class="btn-full" id="histClose">'+t('close')+'</button>'
    ,true);
  setTimeout(function(){
    var hc=document.getElementById('histClose');
    if(hc) hc.onclick=closeModal;
    const modalEl=document.getElementById('modal-ov');
    if(!modalEl) return;
    modalEl.querySelectorAll('.hedit-btn').forEach(function(btn){
      btn.onclick=function(){editLog(btn.dataset.gid,parseInt(btn.dataset.idx));};
    });
    modalEl.querySelectorAll('.hdel-btn').forEach(function(btn){
      btn.onclick=function(){delLog(btn.dataset.gid,parseInt(btn.dataset.idx));};
    });
  },50);
}
function showModal(html,sheet=false){
  closeModal();
  const ov=document.createElement('div');
  ov.className='overlay'+(sheet?' bottom':'');
  ov.id='modal-ov';
  ov.innerHTML=`<div class="modal-box${sheet?' sheet':''}">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
}
function closeModal(){document.getElementById('modal-ov')?.remove();}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/alexkpi/sw.js?20260529092511').then(reg=>{
      console.log('[App] SW registered');
      if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            window.location.reload(true);
          }
        });
      });
      document.addEventListener('visibilitychange',()=>{
        if(document.visibilityState==='visible') reg.update();
      });
    }).catch(e=>console.warn('[App] SW fail',e));
    navigator.serviceWorker.addEventListener('controllerchange',()=>window.location.reload(true));
  });
}

load();

if(_lb) _lb.textContent=lang==='ko'?'KO':'EN';
const _tl=T[lang];

const _tdi=document.getElementById('tab-dash');
const _thi=document.getElementById('tab-hist');
if(_tli) _tli.textContent=_tl.list;
if(_tdi) _tdi.textContent=_tl.dash;
if(_thi) _thi.textContent=_tl.hist;
render(); resetFabTimer();
</script>
