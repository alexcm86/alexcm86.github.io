  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;font-synthesis:none}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

  /* Header */
  #header{background:var(--header-bg);border-bottom:none;padding:0 8px;display:flex;align-items:center;height:calc(56px + var(--safe-top));padding-top:var(--safe-top);gap:5px;flex-shrink:0;z-index:10;box-shadow:0 2px 16px var(--header-shadow);}
  .logo{font-weight:800;font-size:15px;letter-spacing:-0.3px;flex-shrink:0;color:#ffffff;white-space:nowrap;text-shadow:0 2px 12px rgba(0,0,0,0.18);}
  .logo span{color:var(--logo-span)}
  #tabs{display:flex;flex:1;justify-content:center;background:rgba(255,255,255,0.15);border-radius:14px;padding:3px;gap:1px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;}#tabs::-webkit-scrollbar{display:none;}
  .tab-btn{padding:4px 8px;border-radius:7px;border:none;font-size:10px;font-weight:600;font-family:inherit;background:transparent;color:rgba(255,255,255,0.55);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
  .tab-btn.active{background:#ffffff;color:var(--tab-active-color);box-shadow:0 1px 6px rgba(0,0,0,0.15);font-weight:700}


  /* Todo */
  #todo-main{flex:1;overflow-y:auto;padding:12px 16px;padding-bottom:calc(100px + var(--safe-bottom));}
  .todo-date{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px;}
  .todo-add-bar{display:flex;gap:8px;margin-bottom:16px;}
  .todo-input{flex:1;padding:10px 14px;border-radius:12px;border:1.5px solid var(--input-border);font-size:14px;font-family:inherit;outline:none;background:var(--input-bg);color:var(--todo-text);}
  .todo-input:focus{border-color:var(--accent3);}
  .todo-add-btn{padding:10px 16px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
  .todo-section-label{font-size:11px;font-weight:700;color:var(--muted2);letter-spacing:0.5px;margin:8px 0 6px;text-transform:uppercase;}
  .todo-item{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,0.06);cursor:pointer;transition:all .15s;}
  .todo-item.done{opacity:0.5;}
  .todo-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--accent3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
  .todo-item.done .todo-check{background:var(--accent3);border-color:var(--accent3);}
  .todo-check-icon{color:#fff;font-size:12px;display:none;}
  .todo-item.done .todo-check-icon{display:block;}
  .todo-text{flex:1;font-size:14px;font-weight:500;color:var(--todo-text);}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--muted2);}
  .todo-kpi-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--todo-tag-bg);color:var(--todo-tag-color);}
  .todo-del{font-size:16px;color:var(--muted3);padding:2px 4px;cursor:pointer;flex-shrink:0;}
  .todo-del:hover{color:#ef4444;}
  .todo-kpi-select{width:100%;margin-top:8px;padding:8px 12px;border-radius:14px;border:1.5px solid var(--input-border);font-size:13px;font-family:inherit;outline:none;background:var(--input-bg);color:var(--todo-tag-color);}
  .todo-empty{text-align:center;padding:48px 0;color:var(--muted2);font-size:14px;}

  /* Main */
  #main{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:10px 14px 0;}

  /* FAB */
  #fab{position:fixed;bottom:calc(76px + var(--safe-bottom));right:18px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent3));color:#fff;border:none;font-size:22px;box-shadow:0 4px 20px rgba(0,0,0,0.25),0 0 0 3px rgba(255,255,255,0.2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .3s;z-index:20;opacity:1;}
  #fab.hidden{opacity:0;pointer-events:none}
  #fab:active{transform:scale(0.9)}

  /* Filter */
  #filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;margin-bottom:6px;}
  #filter-bar::-webkit-scrollbar{display:none}
  .filter-chip{padding:5px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--sub);font-weight:600;font-size:11px;font-family:inherit;white-space:nowrap;cursor:pointer;flex-shrink:0}
  .filter-chip.active{background:var(--accent-bg);border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-border);color:var(--accent2)}

  /* Controls */
  #ctrl-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-shrink:0;}
  .size-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--accent-border);background:var(--accent-bg);color:var(--accent2);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .size-btn:active{background:var(--bar-track,#f0f0f0)}
  #size-label{font-size:11px;color:var(--sub);font-weight:600;min-width:30px;text-align:center}
  .sort-btn{margin-left:auto;padding:4px 11px;border-radius:99px;border:1.5px solid var(--accent-border);background:var(--accent-bg);font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;color:var(--accent2);}

  /* Card list */
  #card-list{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(130px + var(--safe-bottom));}
  #card-list::-webkit-scrollbar{display:none}

  /* KPI Card */
  .kpi-card{background:var(--card);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);position:relative;margin-bottom:8px;overflow:hidden;}
  .kpi-card.done{border-color:var(--accent);box-shadow:0 2px 12px rgba(0,0,0,0.15);}
  .card-inner{display:flex;align-items:center;padding:0 10px;height:var(--card-h,72px);gap:9px;}

  /* Ring - CSS로 크기 제어, viewBox 고정 */
  .ring-wrap{position:relative;flex-shrink:0;width:var(--ring,40px);height:var(--ring,40px);}
  .ring-svg{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;line-height:1;}

  .kpi-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:1px;padding-right:2px}
  .kpi-chips{display:flex;align-items:center;gap:4px}
  .cat-chip{font-weight:600;border-radius:4px;padding:1px 5px}
  .kpi-title{font-weight:700;line-height:1.3;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kpi-nums{color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kpi-bar-wrap{height:3px;background:var(--bar-track,#f0f0f0);border-radius:99px;overflow:hidden;margin-top:2px}
  .kpi-bar-fill{height:100%;border-radius:99px}
  .done-badge{position:absolute;top:6px;right:8px;background:linear-gradient(135deg,#f5a623,#fbbf24);color:#fff;font-weight:700;border-radius:5px;padding:1px 5px;line-height:1.4;}
  .drag-handle{flex-shrink:0;display:flex;flex-direction:column;justify-content:center;gap:3px;padding:4px;cursor:grab;opacity:0.3}
  .drag-handle div{width:14px;height:2px;background:var(--sub);border-radius:2px}

  /* Actions */
  .kpi-actions{display:flex;border-top:1px solid var(--divider,#f5f5f5);}
  .act-btn{flex:1;border:none;background:transparent;font-family:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
  .act-btn+.act-btn{border-left:1px solid var(--divider,#f5f5f5)}
  .act-log{color:#fff;flex:2}.act-hist{color:var(--sub)}.act-edit{color:var(--sub)}.act-del{color:var(--red)}

  /* Dashboard */
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
  .stat-card{background:var(--card);border-radius:14px;padding:14px 8px;text-align:center;box-shadow:var(--shadow);color:var(--text)}
  .stat-val{font-size:24px;font-weight:800;letter-spacing:-1px;display:flex;align-items:baseline;justify-content:center;gap:1px}
  .stat-val sub{font-size:12px;font-weight:500;color:var(--sub);vertical-align:baseline}
  .stat-label{font-size:12px;color:var(--sub);margin-top:2px}
  .section-card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;border:1px solid var(--border)}
  .section-title{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:0.3px;margin-bottom:12px}
  .cat-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .cat-label{font-size:13px;font-weight:700;width:60px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{flex:1;height:8px;background:var(--bar-track,#f0f0f0);border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width 0.5s ease;filter:brightness(1.05);}
  .bar-pct{font-size:13px;font-weight:700;color:var(--accent);width:36px;text-align:right}
  #dash-main{flex:1;overflow-y:auto;padding-bottom:calc(130px + var(--safe-bottom))}

  /* Top KPI list in dash */
  .top-kpi-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--divider,#f5f5f5)}
  .top-kpi-row:last-child{border-bottom:none}
  .top-rank{font-size:16px;font-weight:800;color:var(--mute);width:22px;text-align:center}
  .top-title{flex:1;font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top-pct{font-size:15px;font-weight:800}

  .empty{text-align:center;padding:60px 0;color:var(--mute)}
  .empty-icon{font-size:36px;margin-bottom:10px}
  .empty-text{font-size:13px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:100;display:flex;align-items:center;justify-content:center;padding:0 14px;animation:fadeIn .18s ease}
  .overlay.bottom{align-items:flex-end;padding:0}
  .modal-box{background:var(--card);border-radius:20px;width:100%;max-width:440px;padding:24px 20px 20px;box-shadow:0 24px 60px rgba(0,0,0,0.25);animation:slideUp .2s ease;max-height:88vh;overflow-y:auto}
  .modal-box.sheet{border-radius:18px 18px 0 0;max-width:100%;padding-bottom:calc(20px + var(--safe-bottom));animation:slideUpB .2s ease;max-height:75vh}
  .modal-title{font-weight:800;font-size:16px;margin-bottom:18px}
  label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:4px;margin-top:12px}
  label:first-of-type{margin-top:0}
  input,select,textarea{width:100%;padding:10px 12px;border-radius:14px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;color:var(--text);background:var(--input-bg);outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--input-bg)}
  textarea{resize:none;height:66px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

function getTodayQuote(){
  const now=new Date();
  const start=new Date(now.getFullYear(),0,1);
  const day=Math.floor((now-start)/86400000);
  return QUOTES[Math.abs(day)%QUOTES.length];
}
function isQuoteDismissedToday(){

}

let cardScale=100;
const SCALE_STEP=5, SCALE_MIN=40, SCALE_MAX=100;


// FAB 자동 숨김
let fabTimer=null;
const fab=document.getElementById('fab');
function resetFabTimer(){
  fab.classList.remove('hidden');
  clearTimeout(fabTimer);
  fabTimer=setTimeout(()=>fab.classList.add('hidden'),2000);
}

// 숫자 포맷 (천단위 ,)
function fmt(n){
  if(n==null||n==='') return '';
  return Number(n).toLocaleString('ko-KR');
}

function load(){
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE_KEY));
    goals=d.goals||[]; todos=d.todos||[]; cardScale=d.scale||100; lang=d.lang||'ko'; theme=d.theme||'default'; applyTheme(theme,true);

  }catch{goals=[];todos=[];cardScale=100;lang='ko';theme='default';applyTheme('default',true);}
}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({goals,todos,scale:cardScale,lang,theme}));}catch(e){console.warn(T[lang].saveFail,e);}}
function exportData(){
  const data=JSON.stringify({goals,todos,scale:cardScale,lang,theme},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;
  a.download=`kpi-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d.goals)) throw new Error('invalid');
      goals=d.goals;
      if(d.todos) todos=d.todos;
      if(d.scale) cardScale=d.scale;
      if(d.lang) lang=d.lang;
      if(d.theme) applyTheme(d.theme,true); else applyTheme('default',true);
      save();render();
      alert(lang==='ko'?`✅ ${goals.length}개 KPI 복원 완료!`:`✅ ${goals.length} KPIs restored!`);
    }catch{
      alert(lang==='ko'?'❌ 올바른 백업 파일이 아니에요':'❌ Invalid backup file');
    }
  };
  reader.readAsText(file);
  e.target.value='';
}
function genId(){return Math.random().toString(36).slice(2,9);}
function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseLocalDate(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pctVal(g){return g.target>0?Math.round((g.current/g.target)*100):0;}

function formatDateLabel(dateStr){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const dayNames=lang==='ko'?['일','월','화','수','목','금','토']:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return lang==='ko'
    ?`${y}년 ${m}월 ${d}일 (${dayNames[dt.getDay()]})`
    :`${dayNames[dt.getDay()]}, ${dt.toLocaleDateString('en-US',{month:'long',day:'numeric'})}`;
}

function renderTodoItems(items, isHistory){
  let h='';
  items.forEach(td=>{
    const kpiName=td.kpiId?goals.find(g=>g.id===td.kpiId)?.title:'';
    const isDone=td.done;
    h+=`<div class="todo-item${isDone?' done':''}" onclick="${isHistory?'':` toggleTodo('${td.id}')`}">
      <div class="todo-check"><span class="todo-check-icon">✓</span></div>
      <div class="todo-text">${esc(td.text)}</div>
      ${kpiName?`<span class="todo-kpi-tag">🎯 ${esc(kpiName)}</span>`:''}
      ${!isHistory?`<span class="todo-del" onclick="event.stopPropagation();deleteTodo('${td.id}')">×</span>`:''}
    </div>`;
  });
  return h;
}

function renderTodo(){
  const todayStr=today();
  // kpi 옵션 (미사용 제거)

  // 날짜별 그룹핑 (최신순)
  const dateMap={};
  todos.forEach(td=>{
    if(!dateMap[td.date]) dateMap[td.date]=[];
    dateMap[td.date].push(td);
  });
  const sortedDates=Object.keys(dateMap).sort((a,b)=>b.localeCompare(a));

  let h=`<div id="todo-main">`;

  // 오늘 섹션 (상단 고정)
  h+=`<div class="todo-date">${formatDateLabel(todayStr)}</div>`;
  const kpiOptions=goals.length
    ?`<option value="">${lang==='ko'?'KPI 연결 안함':'No KPI link'}</option>`+goals.map(g=>`<option value="${g.id}">${esc(g.title)}</option>`).join('')
    :'';
  h+=`<div class="todo-add-bar">
    <input class="todo-input" id="todo-input" type="text" placeholder="${lang==='ko'?'오늘 할일 입력...':'Add a task for today...'}" onkeydown="if(event.key==='Enter')addTodo()">
    <button class="todo-add-btn" onclick="addTodo()">${lang==='ko'?'추가':'Add'}</button>
  </div>`;
  if(goals.length){
    h+=`<select class="todo-kpi-select" id="todo-kpi-select" style="margin-bottom:12px">${kpiOptions}</select>`;
  }


  const todayItems=dateMap[todayStr]||[];
  const pending=todayItems.filter(td=>!td.done);
  const done=todayItems.filter(td=>td.done);

  if(todayItems.length===0){
    h+=`<div class="todo-empty">✏️<br>${lang==='ko'?'오늘 할일을 추가해보세요':'Add tasks for today'}</div>`;
  } else {
    if(pending.length>0){
      h+=`<div class="todo-section-label">${lang==='ko'?`미완료 ${pending.length}개`:`${pending.length} pending`}</div>`;
      h+=renderTodoItems(pending, false);
    }
    if(done.length>0){
      h+=`<div class="todo-section-label">${lang==='ko'?`완료 ${done.length}개`:`${done.length} done`}</div>`;
      h+=renderTodoItems(done, false);
    }
  }

  // 이전 날짜 히스토리 (아래로, 접기/펼치기)
  const pastDates=sortedDates.filter(d=>d!==todayStr);
  if(pastDates.length>0){
    h+=`<div style="margin-top:24px;border-top:1.5px solid var(--input-border);padding-top:16px;">`;
    h+=`<div style="font-size:12px;font-weight:700;color:var(--muted2);margin-bottom:12px;">${lang==='ko'?'📅 이전 기록':'📅 Past Records'}</div>`;
    pastDates.forEach(dateStr=>{
      const items=dateMap[dateStr];
      const pDone=items.filter(td=>td.done).length;
      const hasUndone=items.some(td=>!td.done);
      const collapseId=`todo-hist-${dateStr}`;
      h+=`<div style="margin-bottom:10px;background:var(--card);border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,0.06);overflow:hidden;">`;
      // 헤더 (탭하면 접기/펼치기)
      h+=`<div onclick="toggleTodoHist('${collapseId}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;font-weight:700;color:var(--text);">${formatDateLabel(dateStr)}</span>
          ${hasUndone?`<span style="font-size:10px;font-weight:700;color:#f59e0b;background:rgba(245,158,11,0.15);padding:1px 6px;border-radius:20px;">${lang==='ko'?'미완료':'undone'}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:var(--muted2);">${pDone}/${items.length} ${lang==='ko'?'완료':'done'}</span>
          <span id="${collapseId}-arrow" style="font-size:12px;color:var(--muted2);transition:transform .2s;">▼</span>
        </div>
      </div>`;
      // 내용 (기본 접힘)
      h+=`<div id="${collapseId}" style="display:none;padding:0 14px 12px;">`;
      h+=renderTodoItems(items, true);
      h+=`</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  h+=`</div>`;
  return h;
}


function toggleTodoHist(id){
  const el=document.getElementById(id);
  const arrow=document.getElementById(id+'-arrow');
  if(!el) return;
  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
  if(arrow) arrow.style.transform=isOpen?'':'rotate(180deg)';
}
function addTodo(){
  const input=document.getElementById('todo-input');
  const kpiSel=document.getElementById('todo-kpi-select');
  const text=(input?.value||'').trim();
  if(!text) return;
  const kpiId=kpiSel?kpiSel.value:'';
  todos.push({id:genId(),text,kpiId,done:false,date:today()});
  save();render();
}

function toggleTodo(id){
  const td=todos.find(item=>item.id===id);
  if(!td) return;
  td.done=!td.done;
  td.doneAt=td.done?new Date().toISOString():null;
  save();render();
}

function deleteTodo(id){
  if(!confirm(lang==='ko'?'삭제할까요?':'Delete this task?')) return;
  todos=todos.filter(item=>item.id!==id);
  save();render();
}


function applyTheme(t,skipSaveRender=false){
  theme=t;
  const cls={peach:'theme-peach',dark:'theme-dark',forest:'theme-forest',ocean:'theme-ocean',midnight:'theme-midnight',sunshine:'theme-sunshine',military:'theme-military'};
  document.body.className=cls[t]||'';
  const btn=document.getElementById('theme-btn');
  const ico={peach:'🌸',dark:'🌙',forest:'🌿',ocean:'🌊',midnight:'🔮',sunshine:'☀️',military:'🪖'};
  if(btn) btn.textContent=ico[t]||'🎨';
  if(!skipSaveRender){save();render();}
}
function toggleTheme(){
  const order=['default','peach','sunshine','forest','ocean','military','dark','midnight'];
  const idx=order.indexOf(theme);
  const next=order[(idx+1)%order.length];
  applyTheme(next);
}

function captureScreen(){
  const viewNames={list:'목록',dash:'대시보드',history:'이력',todo:'할일'};
  const btn=document.querySelector('[onclick="captureScreen()"]');
  if(btn) btn.style.opacity='0';
  const captureBg={dark:'#0d1117',midnight:'#0f0b1e',peach:'#fff0f0',forest:'#f0f7f0',ocean:'#e8f4f8',sunshine:'#fffde7',military:'#1e2118'};
  const bgColor=captureBg[theme]||'#f4f6fb';

  // 이력 탭이면 통계+달성률현황 영역만 캡처
  let target;
  if(view==='history'){
    // year-tab-bar + history-main 안의 year-stats + hist-capture-area 를 감싸는 wrapper 생성
    const yearTab=document.getElementById('year-tab-bar');
    const histMain=document.getElementById('history-main');
    const captureArea=document.getElementById('hist-capture-area');
    if(!histMain||!captureArea){ if(btn) btn.style.opacity='1'; return; }

    const wrapper=document.createElement('div');
    wrapper.style.cssText='background:'+bgColor+';padding:16px;display:inline-block;min-width:'+histMain.offsetWidth+'px;box-sizing:border-box;';
    document.body.appendChild(wrapper);

    // 연도 탭 클론
    if(yearTab){ const c=yearTab.cloneNode(true); c.style.marginBottom='8px'; wrapper.appendChild(c); }

    // year-stats 클론
    const ys=histMain.querySelector('.year-stats');
    if(ys){ wrapper.appendChild(ys.cloneNode(true)); }

    // 달성률 현황 카드 클론
    const ca=captureArea.cloneNode(true);
    ca.style.marginTop='10px';
    wrapper.appendChild(ca);

    html2canvas(wrapper,{useCORS:true,scale:2,backgroundColor:bgColor,scrollX:0,scrollY:0})
    .then(canvas=>{
      document.body.removeChild(wrapper);
      const link=document.createElement('a');
      link.download=`해냄_이력_${today()}.png`;
      link.href=canvas.toDataURL('image/png');
      link.click();
      if(btn) btn.style.opacity='1';
    }).catch(()=>{
      if(document.body.contains(wrapper)) document.body.removeChild(wrapper);
      if(btn) btn.style.opacity='1';
      alert(lang==='ko'?'캡처에 실패했어요.':'Capture failed.');
    });
    return;
  }

  // 목록/대시보드: main div 전체 캡처
  target=document.getElementById('main');
  if(!target){ if(btn) btn.style.opacity='1'; return; }

  const scrollTop=target.scrollTop;
  target.scrollTop=0;

  const wrapper=document.createElement('div');
  wrapper.style.cssText='background:'+bgColor+';padding:16px;display:inline-block;min-width:'+target.offsetWidth+'px';
  document.body.appendChild(wrapper);
  const clone=target.cloneNode(true);
  clone.style.cssText='position:static;overflow:visible;height:auto;padding-bottom:16px;';
  wrapper.appendChild(clone);

  html2canvas(wrapper,{useCORS:true,scale:2,backgroundColor:bgColor,scrollX:0,scrollY:0})
  .then(canvas=>{
    document.body.removeChild(wrapper);
    target.scrollTop=scrollTop;
    const link=document.createElement('a');
    const name=viewNames[view]||view;
    link.download=`해냄_${name}_${today()}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    if(btn) btn.style.opacity='1';
  }).catch(()=>{
    if(document.body.contains(wrapper)) document.body.removeChild(wrapper);
    target.scrollTop=scrollTop;
    if(btn) btn.style.opacity='1';
    alert(lang==='ko'?'캡처에 실패했어요.':'Capture failed.');
  });
}
function switchView(v){
  view=v;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&v==='list')||(i===1&&v==='dash')||(i===2&&v==='history')||(i===3&&v==='todo'));
  });
  render();
}

/* ── Scale ── */
function applyScale(){
  const ratio=(cardScale-SCALE_MIN)/(SCALE_MAX-SCALE_MIN);
  const h=Math.round(38+(72-38)*ratio);
  const actH=Math.round(22+(32-22)*ratio);
  const fs=Math.max(9,Math.round(13*cardScale/100));
  const fsS=Math.max(8,Math.round(11*cardScale/100));
  const fsXS=Math.max(7,Math.round(10*cardScale/100));
  const ring=Math.max(28,Math.round(44*cardScale/100));
  const r=document.documentElement;
  r.style.setProperty('--card-h',h+'px');
  r.style.setProperty('--act-h',actH+'px');
  r.style.setProperty('--fs',fs+'px');
  r.style.setProperty('--fsS',fsS+'px');
  r.style.setProperty('--fsXS',fsXS+'px');
  r.style.setProperty('--ring',ring+'px');
  const lbl=document.getElementById('size-label');
  if(lbl) lbl.textContent=cardScale+'%';
}
function scaleUp(){if(cardScale<SCALE_MAX){cardScale=Math.min(SCALE_MAX,cardScale+SCALE_STEP);save();applyScale();}}
function scaleDown(){if(cardScale>SCALE_MIN){cardScale=Math.max(SCALE_MIN,cardScale-SCALE_STEP);save();applyScale();}}

  const avg=total?Math.round(goals.reduce((s,g)=>s+Math.min(100,pctVal(g)),0)/total):0;
  const byCat=CATS.map(c=>({cat:c,items:goals.filter(g=>g.category===c)})).filter(x=>x.items.length>0);

    const [dy,dm,dd]=g.deadline.split('-').map(Number);
    const deadlineMs=new Date(dy,dm-1,dd).setHours(0,0,0,0);
    const todayMs=new Date().setHours(0,0,0,0);
    const diff=Math.ceil((deadlineMs-todayMs)/86400000);
    return {...g,diff};

    <div class="stat-card"><div class="stat-val">${done}${lang==='ko'?'<sub>개</sub>':''}</div><div class="stat-label">${t("doneCnt")}</div></div>

  sorted.forEach((g,i)=>{

/* ── 차트 그리기 ── */
function drawCharts(){
  drawDonut();
}

function drawDonut(){
  const canvas=document.getElementById('donut-chart');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const byCat=CATS.map(c=>({cat:c,items:goals.filter(g=>g.category===c)})).filter(x=>x.items.length>0);
  if(!byCat.length) return;
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2, outerR=38, innerR=24;
  ctx.clearRect(0,0,W,H);
  let startAngle=-Math.PI/2;
  const total=byCat.reduce((s,{items})=>s+items.length,0);
  byCat.forEach(({cat,items})=>{
    const slice=(items.length/total)*2*Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,outerR,startAngle,startAngle+slice);
    ctx.closePath();
    ctx.fillStyle=getCAT_COLOR()[cat];
    ctx.fill();
    startAngle+=slice;
  });
  // inner hole
  ctx.beginPath();
  ctx.arc(cx,cy,innerR,0,2*Math.PI);
  const holeColor={dark:'#161b22',peach:'#fff8f6',forest:'#ffffff',ocean:'#ffffff',midnight:'#1a1530',sunshine:'#ffffff',military:'#252b1f'};
  ctx.fillStyle=holeColor[theme]||'#ffffff';
  ctx.fill();
}

function renderList(){
  const used=['전체',...CATS.filter(c=>goals.some(g=>g.category===c))];
  let h=`<div id="filter-bar">`+used.map(c=>`<button class="filter-chip${c===filter?' active':''}" onclick="setFilter('${c}')">${c==='전체'?(lang==='ko'?'전체':'All'):catDisplay(c)}</button>`).join('')+`</div>`;
  h+=`<div id="ctrl-bar">
    <button class="size-btn" onclick="scaleDown()">−</button>
    <span id="size-label">${cardScale}%</span>
    <button class="size-btn" onclick="scaleUp()">+</button>
    <button class="sort-btn" onclick="toggleSort()">${sortMode==='pct'?t('sortPct'):t('sortManual')}</button>
  </div>`;
  let list=filter==='전체'?[...goals]:goals.filter(g=>g.category===filter);
  if(sortMode==='pct') list=[...list].sort((a,b)=>pctVal(b)-pctVal(a));
  if(!list.length) return h+`<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">${t('emptyList')}</div></div>`;
  return h+`<div id="card-list">`+list.map(renderCard).join('')+`</div>`;

function setFilter(c){filter=c;render();}
function toggleSort(){
  if(sortMode==='pct'){
    // 달성률순으로 goals 배열 정렬 후 수동 모드 진입
    goals.sort((a,b)=>pctVal(b)-pctVal(a));
    save();
  }
  sortMode=sortMode==='pct'?'manual':'pct';
  render();
}

/* ── 달성이력 ── */
let histYear = null; // 선택된 연도

function renderHistory(){
  // 모든 연도 추출 (createdAt + logs.date 기준)
  const yearSet = new Set();
  goals.forEach(g=>{
    if(g.createdAt) yearSet.add(g.createdAt.slice(0,4));
    (g.logs||[]).forEach(l=>{ if(l.date) yearSet.add(l.date.slice(0,4)); });
  });
  const years=[...yearSet].sort((a,b)=>b-a);
  const curYear=new Date().getFullYear().toString();
  if(!histYear || !yearSet.has(histYear)) histYear = years[0]||curYear;
  if(!years.length) years.push(curYear);

  if(!goals.length){
    return `<div id="history-main"><div class="no-history"><div style="font-size:36px;margin-bottom:10px">📂</div><div style="font-size:13px">${t("noHistory")}</div></div></div>`;
  }

  // 연도 탭
  let h=`<div id="year-tab-bar">`;
  years.forEach(y=>{
    h+=`<button class="year-chip${y===histYear?' active':''}" onclick="selectHistYear('${y}')">${y}년</button>`;
  });
  h+=`</div>`;

  h+=`<div id="history-main">`;

  // 선택 연도의 목표들 필터 (해당 연도에 생성되었거나 로그가 있는 것)
  const yrGoals = goals.filter(g=>{
    const created = (g.createdAt||'').slice(0,4)===histYear;
    const hasLog = (g.logs||[]).some(l=>(l.date||'').slice(0,4)===histYear);
    return created || hasLog;
  });

  // 연도 요약 통계
  const total=yrGoals.length;
  const done=yrGoals.filter(g=>g.current>=g.target).length;
  const yrLogs=yrGoals.flatMap(g=>(g.logs||[]).filter(l=>(l.date||'').slice(0,4)===histYear));
  const totalLogs=yrLogs.length;

  h+=`<div class="year-stats">
    <div class="ys-card"><div class="ys-val">${total}${lang==='ko'?'<sub>개</sub>':''}</div><div class="ys-label">${t("regKpi")}</div></div>
    <div class="ys-card"><div class="ys-val" style="color:var(--accent2)">${done}${lang==='ko'?'<sub>개</sub>':''}</div><div class="ys-label">${lang==='ko'?'달성 완료':'Completed'}</div></div>
    <div class="ys-card"><div class="ys-val" style="color:var(--accent)">${totalLogs}${lang==='ko'?'<sub>건</sub>':''}</div><div class="ys-label">${t("totalLog")}</div></div>
  </div>`;

  if(!yrGoals.length){
    h+=`<div class="no-history" style="padding:30px 0"><div style="font-size:13px;color:var(--mute)">${histYear}${lang==='ko'?'년 데이터가 없어요':' - No data'}</div></div>`;
    return h+`</div>`;
  }

  // 달성률 현황 - 이력 전용 스타일 (링+퍼센트 타임라인)
  const ringTrack={dark:'#2d333b',midnight:'#2e2550',military:'#2e3526'};
  const yrSorted=[...yrGoals].sort((a,b)=>pctVal(b)-pctVal(a));
  const dashTot=2*Math.PI*14;
  h+=`<div class="section-card" id="hist-capture-area" style="margin-bottom:10px">
    <div class="section-title">${histYear}${t('histChart')}</div>
    <div style="display:flex;flex-direction:column;gap:10px">
    ${yrSorted.map((g,i)=>{
      const p=pctVal(g), disp=Math.min(100,p);
      const color=getCAT_COLOR()[g.category], bg=getCAT_BG()[g.category];
      const medals=['🥇','🥈','🥉'];
      const rankLabel=i<3?medals[i]:`<span style="font-size:11px;font-weight:800;color:var(--muted2);min-width:18px;text-align:center">${i+1}</span>`;
      const offset=(dashTot*(1-disp/100)).toFixed(1);
      return `<div style="display:flex;align-items:center;gap:10px">

        <svg width="34" height="34" viewBox="0 0 34 34" style="flex-shrink:0;transform:rotate(-90deg)">
          <circle cx="17" cy="17" r="14" fill="none" stroke="${bg}" stroke-width="4"/>
          <circle cx="17" cy="17" r="14" fill="none" stroke="${color}" stroke-width="4"
            stroke-dasharray="${dashTot.toFixed(1)}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
        </svg>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g.title)}</div>

        </div>
        <div style="font-size:13px;font-weight:800;color:${color};min-width:36px;text-align:right;flex-shrink:0">${p}%</div>
      </div>`;
    }).join('')}

  </div>`;

  // 카테고리별 분류
  const byCat = CATS_KO.map(c=>({cat:c, items:yrGoals.filter(g=>g.category===c)})).filter(x=>x.items.length>0);
  byCat.forEach(({cat,items})=>{
    const catDone=items.filter(g=>g.current>=g.target).length;

    h+=`<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

        <div style="font-size:10px;color:var(--sub);margin-left:auto">${catDone}/${items.length}${lang==='ko'?'개 달성 · 평균 ':` done · avg `}${catAvg}%</div>
      </div>`;
    items.sort((a,b)=>pctVal(b)-pctVal(a)).forEach(g=>{
      const p=pctVal(g), disp=Math.min(100,p);
      const color=getCAT_COLOR()[g.category], bg=getCAT_BG()[g.category];
      const yrGoalLogs=(g.logs||[]).filter(l=>(l.date||'').slice(0,4)===histYear);
      const gid='hg-'+g.id;
      h+=`<div class="hist-goal-card">
        <div class="hist-goal-header" onclick="toggleHistGoal('${gid}')">
          <div style="flex-shrink:0">
            <svg width="32" height="32" viewBox="0 0 44 44" style="transform:rotate(-90deg)">
              <circle cx="22" cy="22" r="18" fill="none" stroke="${ringTrack[theme]||'#f0f0f0'}" stroke-width="4"/>
              <circle cx="22" cy="22" r="18" fill="none" stroke="${color}" stroke-width="4"
                stroke-dasharray="${(2*Math.PI*18).toFixed(1)}"
                stroke-dashoffset="${(2*Math.PI*18*(1-disp/100)).toFixed(1)}"
                stroke-linecap="round"/>
            </svg>
          </div>
          <div class="hist-goal-info">
            <div class="hist-goal-title">${esc(g.title)}</div>
            <div class="hist-goal-sub">${fmt(g.current)} / ${fmt(g.target)} ${esc(g.unit||'')} · ${yrGoalLogs.length}${lang==='ko'?' 건 기록':' records'}</div>
          </div>
          <div class="hist-goal-pct" style="color:${color}">${p}%</div>
          <div class="hist-goal-arrow" id="arr-${gid}">▶</div>
        </div>
        <div class="hist-goal-body" id="${gid}">
          <div class="hist-mini-bar">
            <div class="hist-mini-fill" style="width:${disp}%;background:${color}"></div>

            ${g.current>=g.target?'✅ '+(lang==='ko'?'달성완료':'Achieved'):(lang==='ko'?'진행중':'In Progress')}
          </div>
          ${yrGoalLogs.length===0
            ? `<div style="font-size:12px;color:var(--mute);padding:8px 0">${t('noYearLog')}</div>`

              <div class="hist-log-row">
                <div class="hist-log-date">${l.date}</div>
                <div class="hist-log-val" style="background:${bg};color:${color}">+${fmt(l.value)} ${esc(g.unit||'')}</div>

  });

  h+=`</div>`;
  // 차트 그리기는 DOM 삽입 후
  return h;
}

/* ── Card ── */
function renderCard(g){
  const p=pctVal(g), dispPct=Math.min(100,p);
  const color=getCAT_COLOR()[g.category], bg=getCAT_BG()[g.category];
  const done=p>=100;
  let dday='';
  const todayStr=today();
  // 시작일이 미래면 "N일 후 시작" 표시
  if(g.startAt && g.startAt > todayStr){
    const startDiff=Math.ceil((parseLocalDate(g.startAt)-new Date())/86400000);
    dday=`<span style="font-size:var(--fsXS,9px);color:var(--accent2)">D-${startDiff} 시작</span>`;
  } else if(g.deadline){
    const diff=Math.ceil((parseLocalDate(g.deadline)-new Date())/86400000);
    const muted2=getComputedStyle(document.body).getPropertyValue('--muted2').trim()||'#94a3b8';
    const col=diff<7?'#dc2626':muted2;
    dday=`<span style="font-size:var(--fsXS,9px);color:${col}">${diff>0?'D-'+diff:diff===0?(lang==='ko'?'오늘':'Today'):'D+'+Math.abs(diff)}</span>`;
  }
  // SVG ring: viewBox 고정(0 0 44 44), CSS로 크기 제어 → 깨짐 없음
  const dashTotal=2*Math.PI*18; // r=18
  const dashOffset=(dashTotal*(1-dispPct/100)).toFixed(1);
  const ringTrack={dark:'#2d333b',midnight:'#2e2550',military:'#2e3526'};
  const ringTrackColor=ringTrack[theme]||'#f0f0f0';
  const ring=`<svg class="ring-svg" viewBox="0 0 44 44">
    <circle cx="22" cy="22" r="18" fill="none" stroke="${ringTrackColor}" stroke-width="3.5"/>
    <circle cx="22" cy="22" r="18" fill="none" stroke="${color}" stroke-width="3.5"
      stroke-dasharray="${dashTotal.toFixed(1)}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"/>
  </svg>`;
  const handle=sortMode==='manual'?`<div class="drag-handle"><div></div><div></div><div></div></div>`:'';
  return `<div class="kpi-card${done?' done':''}" data-id="${g.id}" draggable="${sortMode==='manual'}">
    ${done?`<div class="done-badge" style="font-size:var(--fsXS,9px)">${lang==='ko'?'✓달성':'✓Done'}</div>`:''}
    <div class="card-inner">
      <div class="ring-wrap">
        ${ring}
        <div class="ring-label" style="font-size:var(--fsXS,9px);color:${color}">${p}%</div>
      </div>
      <div class="kpi-body">
        <div class="kpi-chips">
          <span class="cat-chip" style="background:${bg};color:${color};font-size:var(--fsXS,9px)">${catDisplay(g.category)}</span>${dday}
        </div>
        <div class="kpi-title" style="font-size:var(--fs,13px)">${esc(g.title)}</div>
        <div class="kpi-nums" style="font-size:var(--fsS,11px)">${fmt(g.current)} / ${fmt(g.target)} ${esc(g.unit||"")}</div>
        <div class="kpi-bar-wrap"><div class="kpi-bar-fill" style="width:${dispPct}%;background:${color}"></div></div>
      </div>
      ${handle}
    </div>
    <div class="kpi-actions" style="height:var(--act-h,30px)">
      <button class="act-btn act-log" style="background:${color};font-size:var(--fsS,11px)" onclick="openLog('${g.id}')">${lang==='ko'?'+ 기록':'+ Log'}</button>
      <button class="act-btn act-hist" style="font-size:var(--fsS,11px)" onclick="openHist('${g.id}')">${lang==='ko'?'히스토리':'History'}</button>
      <button class="act-btn act-edit" style="font-size:var(--fsS,11px)" onclick="openEdit('${g.id}')">${lang==='ko'?'수정':'Edit'}</button>
      <button class="act-btn act-del" style="font-size:var(--fsS,11px)" onclick="delGoal('${g.id}')">${lang==='ko'?'삭제':'Delete'}</button>
    </div>
  </div>`;
}

/* ── Drag ── */
function initDrag(){
  if(sortMode!=='manual') return;
  const list=document.getElementById('card-list');
  if(!list) return;
  let dragging=null, placeholder=null;
  function getCard(el){while(el&&!el.classList.contains('kpi-card'))el=el.parentElement;return el;}
  function cards(){return[...list.querySelectorAll('.kpi-card')];}
  list.addEventListener('touchstart',e=>{
    const h=e.target.closest('.drag-handle');
    if(!h) return;
    e.preventDefault();
    dragging=getCard(h); if(!dragging) return;
    dragging.style.opacity='0.5';
    placeholder=document.createElement('div');
    placeholder.style.cssText=`height:${dragging.offsetHeight}px;margin-bottom:6px;border-radius:12px;background:var(--accent-bg);border:2px dashed var(--accent)`;
    list.insertBefore(placeholder,dragging.nextSibling);
  },{passive:false});
  list.addEventListener('touchmove',e=>{
    if(!dragging) return; e.preventDefault();
    const y=e.touches[0].clientY;
    dragging.style.cssText=`opacity:0.5;position:fixed;width:${list.offsetWidth}px;left:${list.getBoundingClientRect().left}px;top:${y-40}px;z-index:999`;
    const els=cards().filter(c=>c!==dragging);
    for(const c of els){
      const mid=c.getBoundingClientRect().top+c.offsetHeight/2;
      if(y<mid){list.insertBefore(placeholder,c);break;}
      else if(c===els[els.length-1]) list.appendChild(placeholder);
    }
  },{passive:false});
  list.addEventListener('touchend',e=>{
    if(!dragging) return;
    dragging.style.cssText=''; list.insertBefore(dragging,placeholder); placeholder.remove();
    const order=cards().map(c=>c.dataset.id);
    goals.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
    save(); dragging=null; placeholder=null;
  });
}

/* ── CRUD ── */
function delGoal(id){if(confirm(t('deleteConfirm'))){goals=goals.filter(g=>g.id!==id);save();render();}}

function openAddModal(){
  showModal(`<div class="modal-title">${t("addTitle")}</div>
    <label>${t("nameLbl")}</label>
    <input id="f-title" placeholder="${t('namePh')}" oninput="chkSave()">
    <div class="row2">
      <div><label>${t("catLbl")}</label><select id="f-cat">${getCats().map((c,i)=>`<option value="${CATS_KO[i]}">${c}</option>`).join('')}</select></div>
      <div><label>${t("unitLbl")}</label><input id="f-unit" placeholder="${t('unitPh')}"></div>
    </div>
    <div class="row2">
      <div><label>${t("startLbl")}</label><input id="f-start" type="date"></div>
      <div><label>${t("deadlineLbl")}</label><input id="f-deadline" type="date"></div>
    </div>
    <div class="row2">
      <div><label>${t("targetLbl")}</label><input id="f-target" type="number" placeholder="100" oninput="chkSave()"></div>
      <div></div>
    </div>
    <label>${t("noteLbl")}</label><textarea id="f-note" placeholder="${t('notePh')}"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">${t("cancel")}</button>
      <button id="btn-save" class="btn-save" disabled onclick="saveAdd()">${t("save")}</button>
    </div>`);
}
function chkSave(){
  const titleVal=document.getElementById('f-title')?.value.trim();
  const n=document.getElementById('f-target')?.value;
  const b=document.getElementById('btn-save');
  if(b) b.disabled=!(titleVal&&Number(n)>0);
}
function saveAdd(){
  goals.unshift({id:genId(),
    title:document.getElementById('f-title').value.trim(),
    category:document.getElementById('f-cat').value,
    unit:document.getElementById('f-unit').value.trim(),
    target:Number(document.getElementById('f-target').value),
    deadline:document.getElementById('f-deadline').value,
    note:document.getElementById('f-note').value.trim(),
    startAt:document.getElementById('f-start').value||today(),
    current:0,logs:[],createdAt:today()
  });
  save();closeModal();render();
}
function openEdit(id){
  const g=goals.find(x=>x.id===id);
  if(!g) return;
  showModal(`<div class="modal-title">${t("editTitle")}</div>
    <label>${t('nameLbl')}</label>
    <input id="f-title" value="${esc(g.title)}" oninput="chkSave()">
    <div class="row2">
      <div><label>${t("catLbl")}</label><select id="f-cat">${getCats().map((c,i)=>`<option value="${CATS_KO[i]}"${CATS_KO[i]===g.category?' selected':''}>${c}</option>`).join('')}</select></div>
      <div><label>${t('unitLbl')}</label><input id="f-unit" value="${esc(g.unit||"")}"></div>
    </div>
    <div class="row2">
      <div><label>${t('targetLbl')}</label><input id="f-target" type="number" value="${g.target}"></div>
      <div><label>${t('deadlineLbl')}</label><input id="f-deadline" type="date" value="${g.deadline||''}"></div>
    </div>
    <div class="row2">
      <div><label>${t('startLbl')}</label><input id="f-start" type="date" value="${g.startAt||''}"></div>
      <div></div>
    </div>
    <label>${t('noteLbl')}</label><textarea id="f-note">${esc(g.note||"")}</textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">${t("cancel")}</button>
      <button class="btn-save" onclick="saveEdit('${id}')">${t("save")}</button>
    </div>`);
}
function saveEdit(id){
  const i=goals.findIndex(x=>x.id===id);
  if(i===-1) return;
  const newTitle=document.getElementById('f-title').value.trim();
  const newTarget=Number(document.getElementById('f-target').value);
  if(!newTitle||newTarget<=0){alert(lang==='ko'?'목표 이름과 수치를 확인하세요':'Check goal name and target value');return;}
  goals[i]={...goals[i],
    title:newTitle,
    category:document.getElementById('f-cat').value,
    unit:document.getElementById('f-unit').value.trim(),
    target:newTarget,
    deadline:document.getElementById('f-deadline').value,
    startAt:document.getElementById('f-start').value||goals[i].startAt||today(),
    note:document.getElementById('f-note').value.trim()
  };
  save();closeModal();render();
}
function openLog(id){
  const g=goals.find(x=>x.id===id);
  if(!g) return;
  showModal(`<div class="modal-title">${t("logTitle")}</div>
    <div style="font-size:13px;color:var(--sub);margin-bottom:12px">
      <b>${esc(g.title)}</b><br>
      ${lang==='ko'?'현재':'Current'} <b>${fmt(g.current)}</b> / ${lang==='ko'?'목표':'Target'} <b>${fmt(g.target)} ${esc(g.unit)}</b>
    </div>
    <label>${t('logDate')}</label>
    <input id="l-date" type="date" value="${today()}" style="margin-bottom:4px">
    <label>${t("logLbl")}</label>
    <input id="l-val" type="number" placeholder="${t('logPh')}" oninput="chkLog()">
    <label>${t("noteLbl")}</label>
    <input id="l-note" placeholder="${t('logNote')}">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">${t("cancel")}</button>
      <button id="btn-log" class="btn-save" disabled onclick="saveLog('${id}')">${t('logBtn')}</button>
    </div>`);
  setTimeout(()=>document.getElementById('l-val')?.focus(),100);
}
function chkLog(){const v=document.getElementById('l-val')?.value;const b=document.getElementById('btn-log');if(b)b.disabled=!v;}
function saveLog(id){
  const val=parseFloat(document.getElementById('l-val').value);
  if(!val||isNaN(val)||val<=0){alert(lang==='ko'?'0보다 큰 값을 입력하세요':'Please enter a value greater than 0');return;}
  const note=document.getElementById('l-note').value.trim();
  const i=goals.findIndex(x=>x.id===id);
  if(i===-1) return;
  const logDate=document.getElementById('l-date')?.value||today();
  goals[i].logs.push({date:logDate,value:val,note});
  goals[i].current=goals[i].logs.reduce(function(s,l){return s+l.value;},0);
  save();closeModal();render();
}
function editLog(gid,idx){
  const g=goals.find(x=>x.id===gid);
  if(!g||!g.logs[idx]) return;
  const l=g.logs[idx];
  showModal(`<div class="modal-title">${lang==='ko'?'기록 수정':'Edit Record'}</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:14px">${esc(g.title)} · ${l.date}</div>
    <label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">${lang==='ko'?'값':'Value'} (${esc(g.unit)})</label>
    <input id="elv" type="number" value="${l.value}" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;margin-bottom:10px;box-sizing:border-box;background:var(--input-bg);color:var(--text)">
    <label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">${lang==='ko'?'메모':'Note'}</label>
    <input id="eln" type="text" value="${esc(l.note||'')}" placeholder="${lang==='ko'?'메모 (선택)':'Note (optional)'}" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:16px;box-sizing:border-box;background:var(--input-bg);color:var(--text)">
    <button class="btn-full" id="elSave">${lang==='ko'?'저장':'Save'}</button>
    <button class="btn-full" style="background:var(--accent-bg);color:var(--sub);margin-top:8px" id="elCancel">${lang==='ko'?'취소':'Cancel'}</button>
  `);
  document.getElementById('elSave').onclick=function(){
    const v=parseFloat(document.getElementById('elv').value);
    const n=document.getElementById('eln').value.trim();
    if(isNaN(v)||v<=0){alert(lang==='ko'?'올바른 값을 입력하세요':'Please enter a valid value');return;}
    g.logs[idx]={date:g.logs[idx].date,value:v,note:n};
    g.current=g.logs.reduce(function(s,l){return s+l.value;},0);
    save();render();closeModal();
    setTimeout(function(){openHist(gid);},150);
  };
  document.getElementById('elCancel').onclick=function(){
    closeModal();setTimeout(function(){openHist(gid);},150);
  };
}
function delLog(gid,idx){
  if(!confirm(lang==='ko'?'이 기록을 삭제할까요?':'Delete this record?'))return;
  const g=goals.find(x=>x.id===gid);
  if(!g) return;
  g.logs.splice(idx,1);
  g.current=g.logs.reduce(function(s,l){return s+l.value;},0);
  save();render();closeModal();
  setTimeout(function(){openHist(gid);},150);
}
function openHist(id){
  const g=goals.find(x=>x.id===id);
  if(!g) return;
  const color=getCAT_COLOR()[g.category],bg=getCAT_BG()[g.category];
  const logsCopy=[...g.logs].map(function(l,i){return {l:l,i:i};}).reverse();
  let rows='';
  if(logsCopy.length===0){
    rows='<div style="text-align:center;padding:28px 0;color:var(--muted2);font-size:13px">'+t('noLog')+'</div>';
  } else {
    logsCopy.forEach(function(item){
      const l=item.l, i=item.i;
      rows+='<div style="padding:8px 0;border-bottom:1px solid var(--row-divider)">'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">'
        +'<span style="font-size:11px;color:var(--muted2);flex-shrink:0">'+l.date+'</span>'
        +'<span class="hist-val" style="background:'+bg+';color:'+color+'">+'+fmt(l.value)+' '+esc(g.unit)+'</span>'
        +(l.note?'<span style="font-size:11px;color:var(--sub)">'+esc(l.note)+'</span>':'')
        +'</div>'
        +'<div style="display:flex;gap:6px">'
        +'<button data-gid="'+g.id+'" data-idx="'+i+'" class="hedit-btn" style="flex:1;padding:5px 0;border:1px solid var(--border);border-radius:8px;background:var(--accent-bg);color:var(--sub);cursor:pointer;font-size:12px">'+(lang==='ko'?'✏️ 수정':'✏️ Edit')+'</button>'
        +'<button data-gid="'+g.id+'" data-idx="'+i+'" class="hdel-btn" style="flex:1;padding:5px 0;border:1px solid rgba(220,38,38,0.3);border-radius:8px;background:rgba(220,38,38,0.08);color:#dc2626;cursor:pointer;font-size:12px">'+(lang==='ko'?'🗑️ 삭제':'🗑️ Delete')+'</button>'
        +'</div>'
        +'</div>';
    });
  }
  const noteHtml=g.note?`<div style="font-size:11px;color:var(--sub);background:var(--accent-bg);border-radius:8px;padding:6px 10px;margin-bottom:10px">📝 ${esc(g.note)}</div>`:'';
  showModal('<div class="modal-title">'+t('histTitle')+'</div>'
    +'<div style="font-size:12px;color:var(--sub);margin-bottom:8px">'+esc(g.title)+'</div>'
    +noteHtml
    +'<div style="overflow-y:auto;max-height:260px">'+rows+'</div>'
    +'<button class="btn-full" id="histClose">'+t('close')+'</button>'
    ,true);
  setTimeout(function(){
    var hc=document.getElementById('histClose');
    if(hc) hc.onclick=closeModal;
    const modalEl=document.getElementById('modal-ov');
    if(!modalEl) return;
    modalEl.querySelectorAll('.hedit-btn').forEach(function(btn){
      btn.onclick=function(){editLog(btn.dataset.gid,parseInt(btn.dataset.idx));};
    });
    modalEl.querySelectorAll('.hdel-btn').forEach(function(btn){
      btn.onclick=function(){delLog(btn.dataset.gid,parseInt(btn.dataset.idx));};
    });
  },50);
}
function showModal(html,sheet=false){
  closeModal();
  const ov=document.createElement('div');
  ov.className='overlay'+(sheet?' bottom':'');
  ov.id='modal-ov';
  ov.innerHTML=`<div class="modal-box${sheet?' sheet':''}">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
}
function closeModal(){document.getElementById('modal-ov')?.remove();}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js?20260601130000').then(reg=>{
      console.log('[App] SW registered');
      if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            window.location.reload(true);
          }
        });
      });
      document.addEventListener('visibilitychange',()=>{
        if(document.visibilityState==='visible') reg.update();
      });
    }).catch(e=>console.warn('[App] SW fail',e));
    navigator.serviceWorker.addEventListener('controllerchange',()=>window.location.reload(true));
  });
}

load();
// 언어 버튼 초기 상태

if(_lb) _lb.textContent=lang==='ko'?'KO':'EN';

const _tdi=document.getElementById('tab-dash');
const _thi=document.getElementById('tab-hist');
if(_tli) _tli.textContent=_tl.list;
if(_tdi) _tdi.textContent=_tl.dash;
if(_thi) _thi.textContent=_tl.hist;
render(); resetFabTimer();
</script>
